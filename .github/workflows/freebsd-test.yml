name: FreeBSD Test

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master
      - develop
    tags:
      - 'v*.*.*'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  freebsd-test:
    name: FreeBSD ${{ matrix.build }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        build: [debug, release]
        version: [14.3]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run MetaCall build inside FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          release: ${{ matrix.version }}
          usesh: true
          run: |
            set -eux

            sh ./tools/metacall-environment.sh base python backtrace

            sh ./tools/metacall-configure.sh ${{ matrix.build }} python tests

            sh ./tools/metacall-build.sh ${{ matrix.build }} tests