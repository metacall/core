name: FreeBSD Test

on:
  workflow_dispatch:
  pull_request:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - master
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  freebsd-test:
    name: FreeBSD 15.0 Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install deps, configure, build and test on FreeBSD
        uses: cross-platform-actions/action@v0.32.0
        with:
          operating_system: freebsd
          version: '15.0'
          architecture: x86-64
          shell: bash
          run: |
            set -e
            echo "=== Installing environment (base) ==="
            ./tools/metacall-environment.sh base
            echo "=== Configuring ==="
            mkdir -p build && cd build
            sh ../tools/metacall-configure.sh release tests
            echo "=== Building and installing (no ctest yet) ==="
            sudo mkdir -p /usr/local/share/metacall/configurations
            sh ../tools/metacall-build.sh release install
            echo "=== Diagnostics ==="
            uname -a
            ulimit -c unlimited
            sudo sysctl kern.corefile=/tmp/core.%N.%P
            echo "=== dynlink-test binary: ldd ==="
            if [ -f ./dynlink-test ]; then ldd ./dynlink-test; fi

            echo "=== Re-running dynlink-test verbosely (do not fail here) ==="
            (ctest -V -R '^dynlink-test$' --output-on-failure -C Release) 2>&1 | tee /tmp/dynlink_ctest_verbose.log

            echo "=== Running dynlink-test under gdb (always print bt) ==="
            pkg install -y gdb
            if [ -f ./dynlink-test ]; then
              gdb -q -batch \
                -ex "set pagination off" \
                -ex "run" \
                -ex "bt full" \
                -ex "info registers" \
                -ex "info sharedlibrary" \
                --args ./dynlink-test 
            fi

            echo "=== List potential core dumps ==="
            ls -lah /tmp/core.* 2>/dev/null

            echo "=== Preserve crash evidence for artifacts ==="
            mkdir -p ./dynlink-crash-artifacts
            cp -f /tmp/dynlink_ctest_verbose.log ./dynlink-crash-artifacts/ 2>/dev/null
            cp -f /tmp/core.* ./dynlink-crash-artifacts/ 2>/dev/null

            echo "=== Running full test suite (this is the real gate) ==="
            ctest -j$(sysctl -n hw.ncpu) --timeout 5400 --output-on-failure --test-output-size-failed 3221000000 -C Release
            echo "=== FreeBSD job done ==="

      - name: Upload dynlink crash artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: freebsd-dynlink-crash
          path: build/dynlink-crash-artifacts/
          if-no-files-found: ignore
