name: FreeBSD Test

on:
  workflow_dispatch:
  pull_request:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - master
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  freebsd-test:
    name: FreeBSD Test
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        build: [debug, release]
        version: [14.3]

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run tests in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: ${{ matrix.version }}
          usesh: true
          run: |
            set -eux
            
            sh ./tools/metacall-environment.sh base python c go backtrace
            
            mkdir -p build
            cd build
            
            GIT_BIN="$(command -v git)"
            cmake -DCMAKE_BUILD_TYPE=${{ matrix.build }} \
              -DGIT_EXECUTABLE="${GIT_BIN}" \
              -DOPTION_BUILD_SERIALS=On \
              -DOPTION_BUILD_SERIALS_RAPID_JSON=On \
              -DOPTION_BUILD_LOADERS_PY=On \
              -DOPTION_BUILD_LOADERS_NODE=Off \
              -DOPTION_BUILD_LOADERS_RB=Off \
              -DOPTION_BUILD_TESTS=On \
              -DOPTION_BUILD_EXAMPLES=On \
              -DOPTION_BUILD_SCRIPTS=On \
              -DOPTION_BUILD_PORTS=On \
              ..
            
            gmake -j$(sysctl -n hw.ncpu)
            gmake install

            SERIAL_PLUGIN_PATH="$(find . -type f -name 'librapid_json_serial*.so' | head -n 1 || true)"

            if [ -z "${SERIAL_PLUGIN_PATH}" ]; then
              echo "rapid_json serial plugin was not built"
              exit 1
            fi

            export SERIAL_LIBRARY_PATH="$(dirname "${SERIAL_PLUGIN_PATH}")"
            ctest --verbose --output-on-failure
