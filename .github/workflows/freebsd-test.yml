name: FreeBSD Test

on:
  workflow_dispatch:
  pull_request:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - master
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  freebsd-test:
    name: FreeBSD 15.0 Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install deps, configure, build and test on FreeBSD
        uses: cross-platform-actions/action@v0.32.0
        with:
          operating_system: freebsd
          version: '15.0'
          architecture: x86-64
          shell: bash
          run: |
            set -e
            echo "=== Installing environment (base) ==="
            ./tools/metacall-environment.sh base
            echo "=== Configuring ==="
            mkdir -p build && cd build
            sh ../tools/metacall-configure.sh release tests
            echo "=== Building and installing (no ctest yet) ==="
            sudo mkdir -p /usr/local/share/metacall/configurations
            sh ../tools/metacall-build.sh release install
            echo "=== Diagnostics ==="
            uname -a
            ulimit -c unlimited || true
            if [ -f ./dynlink-test ]; then
              echo "=== dynlink-test binary: ldd ==="
              ldd ./dynlink-test || true
            fi
            echo "=== Re-running dynlink-test verbosely ==="
            ctest -V -R '^dynlink-test$' --output-on-failure -C Release || true
            echo "=== If it crashed, try to get a backtrace ==="
            pkg install -y gdb || true
            if [ -f ./dynlink-test ]; then
              ( gdb -batch -ex run -ex bt -ex quit --args ./dynlink-test ) || true
            fi
            echo "=== Running full test suite ==="
            ctest -j$(sysctl -n hw.ncpu) --timeout 5400 --output-on-failure --test-output-size-failed 3221000000 -C Release
            echo "=== FreeBSD job done ==="
