name: FreeBSD Test

on:
  workflow_dispatch:
  pull_request:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - master
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  freebsd-test:
    name: FreeBSD Test
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        build: [debug, release]
        version: [14.3]

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run tests in FreeBSD VM
        uses: vmactions/freebsd-vm@v1
        with:
          release: ${{ matrix.version }}
          usesh: true
          prepare: |
            set -eux
            pkg update -f
            pkg upgrade -y
          run: |
            set -eux
            
            # Ensure all packages are consistent
            pkg update -f
            pkg upgrade -y
            pkg delete -y pcre2 git 
            pkg install -y pcre2 git
            
            echo "=== FreeBSD Environment ==="
            uname -a
            freebsd-version
            
            echo "=== Verify git ==="
            which git
            git --version
            
            echo "=== Set up the environment ==="
            chmod +x ./tools/metacall-environment.sh
            sh ./tools/metacall-environment.sh base python c go backtrace || echo "Warning: Some packages may have failed to install"
            
            echo "=== Verify installations ==="
            which cmake || echo "CMake not found"
            which gmake || echo "gmake not found"
            python3 --version || echo "Python3 not found"
            
            echo "=== Create build directory ==="
            mkdir -p build
            cd build
            
            echo "=== Configure (CMake) ==="
            GIT_BIN="$(command -v git)" || { echo "git not found"; exit 1; }
            cmake -DCMAKE_BUILD_TYPE=${{ matrix.build }} \
              -DGIT_EXECUTABLE="${GIT_BIN}" \
              -DOPTION_BUILD_LOADERS_PY=On \
              -DOPTION_BUILD_LOADERS_NODE=Off \
              -DOPTION_BUILD_LOADERS_RB=Off \
              -DOPTION_BUILD_TESTS=On \
              -DOPTION_BUILD_EXAMPLES=On \
              -DOPTION_BUILD_SCRIPTS=On \
              -DOPTION_BUILD_PORTS=On \
              .. || { echo "Configure failed"; exit 1; }
            
            echo "=== Build ==="
            gmake -j$(sysctl -n hw.ncpu) || { echo "Build failed"; exit 1; }
            
            echo "=== Install ==="
            gmake install || { echo "Install failed"; exit 1; }
            
            echo "=== Run tests (non-fatal for diagnostics) ==="
            ctest --verbose --output-on-failure || echo "Some tests failed (non-blocking)"
            
            echo "=== Test Summary ==="
            echo "FreeBSD ${{ matrix.build }} build completed"
