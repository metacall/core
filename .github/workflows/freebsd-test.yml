name: FreeBSD Test

on:
  workflow_dispatch:
  pull_request:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - master
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  freebsd-test:
    name: FreeBSD 15.0 Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install deps, configure, build and test on FreeBSD
        uses: cross-platform-actions/action@v0.32.0
        with:
          operating_system: freebsd
          version: '15.0'
          architecture: x86-64
          shell: bash
          run: |
            set -e
            echo "=== Installing environment (base) ==="
            ./tools/metacall-environment.sh base
            echo "=== Configuring ==="
            mkdir -p build && cd build
            sh ../tools/metacall-configure.sh release
            echo "=== Building and installing ==="
            sudo mkdir -p /usr/local/share/metacall/configurations
            sh ../tools/metacall-build.sh release install
            echo "=== FreeBSD job done (build + install; tests off for minimal run) ==="
