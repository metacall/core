name: FreeBSD Sanitizer Test

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: FreeBSD Sanitizer Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # TODO: Implement more architectures and versions matrix
        # TODO: Implement OpenBSD, Haiku, OmniOS
        build: [relwithdebinfo]
        sanitizer: [none, address-sanitizer, thread-sanitizer]
        arch: [x86-64]
        include:
          # Keep this workflow focused on the Python teardown crash; C and Java
          # require extra system SDKs on FreeBSD and fail before tests run.
          - arch: x86-64
            extra-loaders: "wasm"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run FreeBSD VM
        uses: cross-platform-actions/action@v0.32.0
        with:
          operating_system: freebsd
          version: 14.2
          architecture: ${{ matrix.arch }}
          shell: sh
          run: |
            set -ex
            if [ "${{ matrix.sanitizer }}" = "none" ]; then
              SANITIZER_ARG=""
            else
              SANITIZER_ARG="${{ matrix.sanitizer }}"
            fi

            sh ./tools/metacall-environment.sh base python ${{ matrix.extra-loaders }} ruby go cobol file rpc backtrace
            rm -rf build
            mkdir -p build
            cd build

            sh ../tools/metacall-configure.sh ${{ matrix.build }} $SANITIZER_ARG scripts python ${{ matrix.extra-loaders }} ruby go cobol file rpc tests
            cmake --build . -j$(getconf _NPROCESSORS_ONLN)

            command -v gdb || sudo pkg install -y gdb

            find . -name "*.core" -delete

            ulimit -c unlimited
            sysctl kern.coredump=1 || sudo sysctl kern.coredump=1 || true
            sysctl kern.corefile=/home/runner/work/core/core/build/%N.%P.core || sudo sysctl kern.corefile=/home/runner/work/core/core/build/%N.%P.core || true

            CTEST_STATUS=0

            ctest -VV -j$(getconf _NPROCESSORS_ONLN) \
              --output-on-failure \
              --test-output-size-failed 3221000000 || CTEST_STATUS=$?

            echo "================ CORES ================"
            find . -name "*.core" -type f -ls || true

            echo "================ GDB PYTHON ASYNC ================"
            CORE="$(ls -t ./metacall-python-asy*.core 2>/dev/null | head -n 1 || true)"
            BIN="./metacall-python-async-test"

            echo "BIN=$BIN"
            echo "CORE=$CORE"

            if [ -n "$CORE" ] && [ -f "$CORE" ] && [ -x "$BIN" ]; then
              gdb -nx -batch -q "$BIN" "$CORE" \
                -ex "set auto-load safe-path /" \
                -ex "set pagination off" \
                -ex "set debuginfod enabled off" \
                -ex "info threads" \
                -ex "thread apply all bt 30" \
                -ex "py-bt" \
                -ex "info sharedlibrary" || true
            else
              echo "No metacall-python-async core found"
            fi

            echo "================ GDB PYTHON EXCEPTION ================"
            CORE="$(ls -t ./metacall-python-exc*.core 2>/dev/null | head -n 1 || true)"
            BIN="./metacall-python-exception-test"

            echo "BIN=$BIN"
            echo "CORE=$CORE"

            if [ -n "$CORE" ] && [ -f "$CORE" ] && [ -x "$BIN" ]; then
              gdb -nx -batch -q "$BIN" "$CORE" \
                -ex "set auto-load safe-path /" \
                -ex "set pagination off" \
                -ex "set debuginfod enabled off" \
                -ex "info threads" \
                -ex "thread apply all bt 30" \
                -ex "py-bt" \
                -ex "info sharedlibrary" || true
            else
              echo "No metacall-python-exception core found"
            fi

            exit $CTEST_STATUS
