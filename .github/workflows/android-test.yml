name: Android Test

on:
  workflow_dispatch:
  pull_request:
  push:
    tags:
      - "v*.*.*"
    branches:
      - master
      - develop

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  android-build:
    name: Android NDK Build
    runs-on: ubuntu-latest

    # TODO: Add more architectures
    strategy:
      fail-fast: false
      matrix:
        abi: [x86_64]
        api-level: [30]
        build: [release]

    env:
      ANDROID_NDK_VERSION: "26.1.10909125"

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          sdkmanager --install "ndk;${{ env.ANDROID_NDK_VERSION }}"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.ANDROID_NDK_VERSION }}" >> $GITHUB_ENV
          echo "ANDROID_NDK=$ANDROID_HOME/ndk/${{ env.ANDROID_NDK_VERSION }}" >> $GITHUB_ENV

      # TODO Move to metacall-environment.sh
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Create build directory
        run: mkdir -p build

      # TODO: Move to metacall-configure.sh
      - name: Configure CMake for Android
        working-directory: ./build
        run: |
          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=${{ matrix.abi }} \
            -DANDROID_PLATFORM=android-${{ matrix.api-level }} \
            -DANDROID_STL=c++_shared \
            -DCMAKE_BUILD_TYPE=${{ matrix.build == 'debug' && 'Debug' || 'Release' }} \
            -DOPTION_BUILD_LOADERS=ON \
            -DOPTION_BUILD_SCRIPTS=OFF \
            -DOPTION_BUILD_TESTS=ON \
            -DOPTION_BUILD_EXAMPLES=OFF \
            -DOPTION_BUILD_PORTS=OFF \
            -DOPTION_BUILD_CLI=OFF \
            -G Ninja

      # TODO: Move to metacall-configure.sh
      - name: Build
        working-directory: ./build
        run: ninja

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build-${{ matrix.abi }}-api${{ matrix.api-level }}-${{ matrix.build }}
          path: ./build

  android-emulator-test:
    name: Android Emulator Test
    needs: android-build
    runs-on: ubuntu-latest

    # TODO: Add more architectures
    strategy:
      fail-fast: false
      matrix:
        api-level: [30]
        target: [google_apis]
        arch: [x86_64]
        build: [release]

    steps:
      - name: Check out the repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-build-${{ matrix.abi }}-api${{ matrix.api-level }}-${{ matrix.build }}
          path: build

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK for libc++_shared.so
        run: |
          sdkmanager --install "ndk;26.1.10909125"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV

      - name: Run tests on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: ${{ matrix.target }}
          arch: ${{ matrix.arch }}
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            echo "=== Pushing test files to emulator ==="
            adb push build/ /data/local/tmp/metacall/

            echo ""
            echo "=== Files on emulator ==="
            adb shell "ls -la /data/local/tmp/metacall/"

            echo "TODO: Run CTest with emulator"
